version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__FERNET_KEY: 'YlCImzjge_TeZc7jPJ7Jz3OlHHNNlZ4RkbZMO5PxKzA='
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__WEBSERVER__SECRET_KEY: 'smart_farming_secret'
    PYTHONPATH: /opt/airflow/project
    SMART_FARMING_DB_URL: 'postgresql+psycopg2://farming:farming123@smart-farming-db:5432/smart_farming'
  volumes:
    - /home/eliza/smart_farming_analytics/dags:/opt/airflow/dags
    - /home/eliza/smart_farming_analytics/logs:/opt/airflow/logs
    - /home/eliza/smart_farming_analytics:/opt/airflow/project
  depends_on:
    airflow-db:
      condition: service_healthy

services:

  # -------------------------------------------------------
  # Airflow metadata database
  # -------------------------------------------------------
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # -------------------------------------------------------
  # Smart farming data warehouse
  # -------------------------------------------------------
  smart-farming-db:
    image: postgres:16
    environment:
      POSTGRES_USER: farming
      POSTGRES_PASSWORD: farming123
      POSTGRES_DB: smart_farming
    ports:
      - "5432:5432"
    volumes:
      - smart_farming_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "farming"]
      interval: 5s
      retries: 5

  # -------------------------------------------------------
  # Airflow init — runs DB migrations and creates admin user
  # -------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@smartfarming.local"
    depends_on:
      airflow-db:
        condition: service_healthy

  # -------------------------------------------------------
  # Airflow webserver — UI at http://localhost:8080
  # -------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # -------------------------------------------------------
  # Airflow scheduler — triggers DAG runs
  # -------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow_db_data:
  smart_farming_data:
